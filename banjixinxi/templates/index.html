<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>班级信息</title>
</head>
<body>
    <h2>班级列表</h2>
    <table border="1">
        <tr><th>编号</th><th>班级名称</th></tr>
        {% for cid, cname in classes %}

        {% endfor %}
    </table>
</body>
</html>
