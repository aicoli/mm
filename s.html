<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>事件演示 · 模块化封装版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-size: 20px;
            padding: 30px;
            background-color: #f5f5f5;
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            transition: background-color 0.25s ease;
            min-height: 100vh;
        }

        .box {
            width: 320px;
            padding: 24px 20px;
            margin: 24px 0;
            border: 2px solid #3c5a7d;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.85);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            text-align: center;
            font-weight: 500;
            color: #1e2f3e;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        button {
            padding: 12px 32px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            border-radius: 60px;
            background-color: #1e6fdf;
            color: white;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            letter-spacing: 1px;
        }
        
        button:hover {
            background-color: #0f5bbf;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        input {
            padding: 12px 16px;
            font-size: 18px;
            width: 340px;
            border-radius: 40px;
            border: 2px solid #bbb;
            outline: none;
            transition: 0.2s;
            background-color: white;
            font-family: inherit;
        }

        .demo-group {
            background: rgba(255,255,240,0.4);
            padding: 12px 0;
            border-radius: 28px;
        }

        .badge {
            display: inline-block;
            background: #e9ecef;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 14px;
            color: #2c3e66;
            margin-bottom: 15px;
        }
        
        footer {
            margin-top: 40px;
            font-size: 14px;
            color: #6c757d;
            text-align: center;
        }
    </style>
</head>
<body>

    <div style="margin-bottom: 10px;">
        <span class="badge">📦 模块化封装 · JS 独立文件</span>
    </div>
    
    <!-- 惊喜按钮 -->
    <button id="surpriseBtn">🎁 点我有惊喜</button>
    <br><br>

    <!-- 鼠标悬浮特效方块 -->
    <div id="magicBox" class="box">
        🐾 鼠标放上来试试
    </div>

    <!-- 输入框焦点演示 -->
    <input type="text" id="focusInput" placeholder="✨ 请输入内容">
    <br><br>
    
    <!-- 动态时间按钮 -->
    <button id="timeBtn">⏱️ 时间是</button>
    
    <footer>⚡ 所有事件均通过外部 script.js 绑定 | 无行内事件 | 纯模块设计</footer>

    <!-- 引用外部 JavaScript 文件 (完全分离逻辑) -->
    <script src="script.js"></script>
</body>
</html>
