<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container text-center mt-5">
    <div class="card shadow-sm mx-auto" style="max-width: 550px;">
        <div class="card-body p-5">
            <img src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/person-circle.svg" 
                 alt="用户头像" 
                 style="width: 80px; height: 80px; margin-bottom: 20px;">
            
            <h1 class="display-4" style="font-size: 3rem; font-weight: bold;"> 欢迎, {{ username }}！</h1>
            <p class="lead" style="font-size: 1.2rem;">您已成功登录</p>
            <a href="{{ url_for('logout') }}" class="btn btn-danger mt-3">退出登录</a>
        </div>
    </div>
</div>
</body>
</html>
